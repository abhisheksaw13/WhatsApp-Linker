<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Referral - User Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="tel"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="tel"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .code-display {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
            display: none;
        }

        .code-display.active {
            display: block;
        }

        .code {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            letter-spacing: 5px;
            margin: 10px 0;
        }

        .users-list {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid #eee;
        }

        .users-list h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .user-phone {
            font-weight: 600;
            color: #333;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.online {
            background: #4caf50;
        }

        .status-dot.offline {
            background: #f44336;
        }

        .error {
            color: #f44336;
            font-size: 14px;
            margin-top: 10px;
        }

        .success {
            color: #4caf50;
            font-size: 14px;
            margin-top: 10px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin-top: 10px;
        }

        .loading.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 WhatsApp Referral</h1>
        <p class="subtitle">Join our community and get your unique code</p>

        <div class="form-group">
            <label for="phone">📱 Mobile Number</label>
            <input 
                type="tel" 
                id="phone" 
                placeholder="Enter your 10-digit number"
                maxlength="10"
            >
            <div class="error" id="error"></div>
            <div class="success" id="success"></div>
            <div class="loading" id="loading">Generating code...</div>
        </div>

        <button onclick="generateCode()">Generate Code</button>

        <div class="code-display" id="codeDisplay">
            <p>Your Unique Code:</p>
            <div class="code" id="code"></div>
            <p style="color: #666; font-size: 14px; margin-top: 10px;">
                Share this code with others!
            </p>
        </div>

        <div class="users-list">
            <h2>👥 Registered Users</h2>
            <div id="usersList">
                <p style="color: #666; text-align: center;">Loading users...</p>
            </div>
        </div>
    </div>

    <script>
        // Generate referral code
        async function generateCode() {
            const phone = document.getElementById('phone').value;
            const error = document.getElementById('error');
            const success = document.getElementById('success');
            const loading = document.getElementById('loading');
            const codeDisplay = document.getElementById('codeDisplay');

            error.textContent = '';
            success.textContent = '';

            if (!phone || phone.length !== 10) {
                error.textContent = '❌ Please enter a valid 10-digit number';
                return;
            }

            loading.classList.add('active');

            try {
                const response = await fetch('/api/user/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ phone: phone })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('code').textContent = data.data.code;
                    codeDisplay.classList.add('active');
                    success.textContent = '✅ Code generated successfully!';
                    document.getElementById('phone').value = '';
                    loadUsers();
                } else {
                    error.textContent = '❌ ' + data.error;
                }
            } catch (err) {
                error.textContent = '❌ Error: ' + err.message;
            } finally {
                loading.classList.remove('active');
            }
        }

        // Load registered users
        async function loadUsers() {
            try {
                const response = await fetch('/api/users/list');
                const data = await response.json();

                if (data.success && data.data) {
                    const usersList = document.getElementById('usersList');
                    if (data.data.length === 0) {
                        usersList.innerHTML = '<p style="color: #666; text-align: center;">No users registered yet</p>';
                        return;
                    }

                    usersList.innerHTML = data.data.map(user => `
                        <div class="user-item">
                            <div class="user-phone">
                                ${maskPhone(user.phone)}
                            </div>
                            <div class="user-status">
                                <span class="status-dot ${user.status}"></span>
                                <span>${user.status.toUpperCase()}</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error('Error loading users:', err);
            }
        }

        // Mask phone number (show only last 4 digits)
        function maskPhone(phone) {
            return phone.substring(0, 5) + 'xxxxx';
        }

        // Auto-refresh users every 5 seconds
        setInterval(loadUsers, 5000);

        // Load users on page load
        window.addEventListener('load', loadUsers);

        // Allow Enter key to generate code
        document.getElementById('phone').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateCode();
            }
        });
    </script>
</body>
</html>
